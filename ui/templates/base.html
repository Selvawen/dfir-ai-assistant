<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title or "DFIR AI Assistant" }}</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #0b1220; color: #e7eefc; }
    a { color: #9cc2ff; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
    .topbar { display:flex; justify-content:space-between; align-items:center; padding: 16px 24px; background:#0f1a33; border-bottom:1px solid #1d2a4a; }
    .brand { font-weight: 700; letter-spacing: .2px; }
    .pill { display:inline-block; padding: 4px 10px; border:1px solid #2a3b66; border-radius: 999px; font-size: 12px; color:#cfe0ff; }
    .pill.active { background:#162753; border-color:#3f63b8; }
    .grid { display:grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .card { background:#0f1a33; border:1px solid #1d2a4a; border-radius: 14px; padding: 16px; }
    .muted { color:#a9b8d6; }
    .kpi { font-size: 28px; font-weight: 700; }
    table { width:100%; border-collapse: collapse; }
    th, td { text-align:left; padding: 10px 8px; border-bottom: 1px solid #1d2a4a; }
    .sev-high { color:#ffb3b3; }
    .sev-medium { color:#ffd8a8; }
    .sev-low { color:#c7f0ff; }
    code { background:#081028; padding:2px 6px; border-radius:6px; }
    .btn { display:inline-block; padding: 8px 12px; border-radius: 10px; border:1px solid #2a3b66; }
    .badge { display:inline-block; padding:4px 10px; border-radius:999px; font-size:12px; border:1px solid #2a3b66; }
    .badge-auth { color:#c7f0ff; }
    .badge-lateral { color:#ffd8a8; }
    .badge-execution { color:#ffb3b3; }
    .badge-persistence { color:#c8ffcc; }
    .badge-other { color:#a9b8d6; }
    .status { display:inline-block; padding:4px 10px; border-radius:999px; font-size:12px; border:1px solid #2a3b66; }
    .status-open { color:#c7f0ff; }
    .status-progress { color:#ffd8a8; }
    .status-resolved { color:#c8ffcc; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand"><a href="/ui">DFIR AI Assistant</a> <span class="pill">local</span></div>
    <div class="muted">API: <a href="/docs">/docs</a></div>
  </div>
  <div class="wrap">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
